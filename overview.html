    // Meshtastic node synchronization
    async function updateMeshtasticNodes() {
      if (!map || !isLoggedIn) return;
      try {
        const resp = await fetch('/api/meshtastic/nodes');
        if (!resp.ok) {
          console.warn('Meshtastic nodes fetch failed, status:', resp.status);
          return;
        }

        const nodes = await resp.json();
        const seen = new Set();

        // Helper to generate ID if missing
        const genId = (prefix) => `${prefix}-${Date.now()}-${Math.random().toString(36).substring(2, 11)}`;

        for (const n of (nodes || [])) {
          // Extract mesh ID
          const mesh = n.mesh_id || n.id || (n.raw && (n.raw.mesh_id || n.raw.id)) || genId('unknown');
          seen.add(mesh);

          // Get coordinates - check multiple possible locations
          let lat = parseFloat(n.lat);
          let lng = parseFloat(n.lng);

          // If not found at top level, check nested raw structures
          if (isNaN(lat) || isNaN(lng)) {
            if (n.raw) {
              // Check raw.lat/lng
              if (isNaN(lat)) lat = parseFloat(n.raw.lat);
              if (isNaN(lng)) lng = parseFloat(n.raw.lng);

              // Check raw.raw.position (for nested meshtastic data)
              if ((isNaN(lat) || isNaN(lng)) && n.raw.raw && n.raw.raw.position) {
                if (isNaN(lat)) lat = parseFloat(n.raw.raw.position.latitude);
                if (isNaN(lng)) lng = parseFloat(n.raw.raw.position.longitude);
              }

              // Check raw.position (alternative structure)
              if ((isNaN(lat) || isNaN(lng)) && n.raw.position) {
                if (isNaN(lat)) lat = parseFloat(n.raw.position.latitude);
                if (isNaN(lng)) lng = parseFloat(n.raw.position.longitude);
              }
            }
          }

          if (isNaN(lat) || isNaN(lng)) {
            // Remove marker if no valid coordinates
            if (meshtasticMarkers.has(mesh)) {
              const entry = meshtasticMarkers.get(mesh);
              try { map.removeLayer(entry.marker); } catch (e) { }
              meshtasticMarkers.delete(mesh);
            }
            continue;
          }

          // Extract shortName from various possible locations
          // Note: checking both shortName and shortname for backwards compatibility with different Meshtastic versions
          let shortName = null;
          try {
            const getShortName = (obj) => obj && (obj.shortName || obj.shortname);
            shortName = n.shortName || n.short_name ||
              getShortName(n.user) ||
              (n.raw && getShortName(n.raw.user)) ||
              (n.raw && n.raw.raw && getShortName(n.raw.raw.user));
          } catch (e) {
            console.warn('Failed to extract shortName for meshtastic node:', n.mesh_id || n.id, e);
          }

          // Extract longName for popup display on click
          let longName = null;
          try {
            const getLongName = (obj) => obj && (obj.longName || obj.longname);
            longName = n.longName || n.long_name || n.name ||
              getLongName(n.user) ||
              (n.raw && getLongName(n.raw.user)) ||
              (n.raw && n.raw.raw && getLongName(n.raw.raw.user)) ||
              n.callsign || mesh;
          } catch (e) {
            longName = n.name || n.callsign || mesh;
          }

          // Build cyan circle icon for Meshtastic node with shortName (max 4 chars)
          const iconLabel = _escapeHtml((shortName || '').substring(0, 4)) || 'M';
          const iconHtml = `<div style="width:35px;height:35px;"><svg viewBox="0 0 100 100" width="35" height="35"><circle cx="50" cy="50" r="45" fill="#00ffff" stroke="black" stroke-width="4"/><text x="50" y="50" font-size="28" fill="black" text-anchor="middle" dominant-baseline="central" font-weight="bold" font-family="Arial, sans-serif">${iconLabel}</text></svg></div>`;

          // Update existing marker or create new
          if (meshtasticMarkers.has(mesh)) {
            const entry = meshtasticMarkers.get(mesh);
            entry.marker.setLatLng([lat, lng]);
            entry.data = n;

            const newIcon = L.divIcon({
              className: 'meshtastic-marker',
              html: iconHtml,
              iconSize: [35, 35],
              iconAnchor: [18, 18]
            });
            entry.marker.setIcon(newIcon);

            // Update popup with longName
            entry.marker.unbindPopup();
            entry.marker.bindPopup(String(longName));
          } else {
            const icon = L.divIcon({
              className: 'meshtastic-marker',
              html: iconHtml,
              iconSize: [35, 35],
              iconAnchor: [18, 18]
            });

            const marker = L.marker([lat, lng], {
              icon: icon,
              pane: 'meshtasticPane'
            }).addTo(map);

            // Show longName on click via popup
            marker.bindPopup(String(longName));

            meshtasticMarkers.set(mesh, { marker, data: n });
          }
        }

        // Remove markers for nodes no longer in the list
        for (const [mesh, entry] of Array.from(meshtasticMarkers.entries())) {
          if (!seen.has(mesh)) {
            try { map.removeLayer(entry.marker); } catch (e) { }
            meshtasticMarkers.delete(mesh);
          }
        }
      } catch (e) {
        console.warn('updateMeshtasticNodes error', e);
      }
    }

    // Drawing state for overview page

    function _escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }

    function _renderDrawingLayer(d) {
      try {
        let layer;
        const coords = d.coordinates || d.points;
        if (!coords || coords.length < 2) return null;
        if (d.type === 'polygon') {
          layer = L.polygon(coords, { color: d.color || '#0088ff', weight: d.weight || 3, pane: 'drawPane' }).addTo(map);
        } else {
          layer = L.polyline(coords, { color: d.color || '#0088ff', weight: d.weight || 3, pane: 'drawPane' }).addTo(map);
        }
        layer.bindPopup(`<strong>${_escapeHtml(d.name || 'Drawing')}</strong><div style="font-size:.8rem;color:#999">by ${_escapeHtml(d.created_by || d.creator || 'unknown')}</div>`);
        return layer;
      } catch (e) {
        console.error('Failed to render drawing layer:', e);
        return null;
      }
    }

    // GPS & helpers
    let gpsMarker = null; // Track GPS marker globally
    let gpsWatchId = null; // Track GPS watch ID for auto-update
    let gpsUpdateInterval = 5000; // Default 5 seconds
    let gpsAutoEnabled = false; // Auto GPS tracking state
    let _lastGpsSendTime = 0; // Throttle GPS server sends

    function createGpsArrowIconHtml(color) {
      const safeColor = /^[#a-zA-Z0-9().,% ]+$/.test(color) ? color : '#007bff';
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"><path d="M16 2 L30 30 L16 23 L2 30 Z" fill="${safeColor}" stroke="black" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
    }

    // Rotate GPS marker arrow to reflect actual device heading
    function updateGpsMarkerHeading() {
      if (!gpsMarker || !gpsMarker._icon) return;
      var heading = deviceHeading !== null ? deviceHeading : gpsHeading;
      if (heading === null) return;
      var el = gpsMarker._icon.querySelector('svg');
      if (!el) return;
      // The SVG arrow points north (up) at 0°. mapBearing is always 0 (north-up)
      // so the arrow simply rotates by the device heading.
      var rot = heading - mapBearing;
      el.style.transform = 'rotate(' + rot + 'deg)';
      el.style.transformOrigin = 'center';
    }

    // Send GPS position to server so admin_map.html can see it
    async function sendGpsToServer(lat, lng) {
      // Throttle: send at most once per gpsUpdateInterval to avoid flooding
      const now = Date.now();
      if (now - _lastGpsSendTime < gpsUpdateInterval) return;
      try {
        const token = localStorage.getItem('token');
        if (!token) return;
        // Only consume the throttle window after a successful auth check so that
        // an early call without a token does not block the next attempt.
        _lastGpsSendTime = now;
        // Server automatically removes previous GPS positions for this user on POST
        const res = await fetch('/api/map/symbols', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            lat: lat,
            lng: lng,
            type: 'gps_position',
            source_page: 'overview',
            label: currentUserName || 'GPS',
            color: '#007bff',
            icon: 'fa-location-arrow'
          })
        });
      } catch (e) {
        console.warn('sendGpsToServer failed', e);
      }
    }

    // GPS Auto-tracking functions
    function startGpsAutoTracking() {
      if (!navigator.geolocation) {
        alert('Geolocation not supported by browser');
        return;
      }

      gpsAutoEnabled = true;
      localStorage.setItem('lpu5_gps_auto', 'true');

      gpsWatchId = navigator.geolocation.watchPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          // Use GPS movement heading as fallback when device compass is unavailable
          if (position.coords.heading !== null && Number.isFinite(position.coords.heading)) {
            gpsHeading = position.coords.heading;
          }

          // Update or create GPS marker
          if (gpsMarker) {
            gpsMarker.setLatLng([lat, lng]);
          } else {
            gpsMarker = L.marker([lat, lng], {
              icon: L.divIcon({
                className: 'gps-marker-arrow',
                html: createGpsArrowIconHtml('#007bff'),
                iconSize: [50, 50],
                iconAnchor: [25, 25]
              }),
              pane: 'gpsPane'
            }).addTo(map).bindPopup('GPS Position (Auto-tracking)', {
              closeButton: true
            });
          }

          // Update arrow rotation after position/heading change
          updateGpsMarkerHeading();

          // Send GPS position to server for admin_map visibility
          sendGpsToServer(lat, lng);
        },
        (error) => {
          console.warn('GPS auto-tracking error:', error);
        },
        {
          enableHighAccuracy: true,
          timeout: gpsUpdateInterval,
          maximumAge: 0
        }
      );
    }

    function stopGpsAutoTracking() {
      gpsAutoEnabled = false;
      localStorage.setItem('lpu5_gps_auto', 'false');

      if (gpsWatchId !== null) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
      }
    }

    function setGpsUpdateInterval(seconds) {
      gpsUpdateInterval = seconds * 1000;
      localStorage.setItem('lpu5_gps_update_interval', seconds);

      // Restart tracking if active
      if (gpsAutoEnabled) {
        stopGpsAutoTracking();
        startGpsAutoTracking();
      }
    }

    function gpsRefreshWithFallback() {
      const btn = document.getElementById('gps-btn');
      if (!navigator.geolocation) {
        alert('Geolocation is not supported by this browser. Trying IP geolocation as fallback.');
        tryIpFallback(btn);
        return;
      }
      navigator.geolocation.getCurrentPosition(async (p) => {
        const lat = p.coords.latitude, lng = p.coords.longitude;
        // Use GPS movement heading as fallback when device compass is unavailable
        if (p.coords.heading !== null && Number.isFinite(p.coords.heading)) {
          gpsHeading = p.coords.heading;
        }
        // Remove old GPS marker if exists
        if (gpsMarker) {
          try { map.removeLayer(gpsMarker); } catch (e) { }
        }
        // Create persistent GPS marker with arrow icon (matching admin_map.html)
        gpsMarker = L.marker([lat, lng], {
          icon: L.divIcon({
            className: 'gps-marker-arrow',

        updateGpsMarkerHeading();

        map.setView([lat, lng], Math.max(map.getZoom(), 15));
        flashBtn(btn, '#28a745');
        sendGpsToServer(lat, lng);
      }, async (err) => {
        console.warn('geolocation error', err);
        const msg = (err && err.message) ? err.message : '';
        if (msg.includes('Only secure origins')) {
          if (confirm('GPS requires HTTPS. Try IP-based location as fallback?')) {
            await tryIpFallback(btn);
          } else manualCoordinatePrompt();
        } else {
          if (confirm('GPS not available: ' + msg + '\nTry IP-based location?')) {
            await tryIpFallback(btn);
          } else manualCoordinatePrompt();
        }
      }, { enableHighAccuracy: true, timeout: 10000 });
    }

    async function tryIpFallback(btn) {
      try {
        // Try external IP geolocation service (only works with internet access)
        // Use AbortController for better browser compatibility
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), IP_GEOLOCATION_TIMEOUT_MS);

        try {
          const r = await fetch('https://ipapi.co/json/', {
            signal: controller.signal
          });
          clearTimeout(timeoutId);

          if (!r.ok) throw new Error('IP service not reachable');
          const j = await r.json();
          const lat = parseFloat(j.latitude || j.lat || 0);
          const lng = parseFloat(j.longitude || j.lon || 0);
          if (!lat || !lng) throw new Error('no coordinates in IP response');

          // Remove old GPS marker if exists
          if (gpsMarker) {
            try { map.removeLayer(gpsMarker); } catch (e) { }
          }

          // Create persistent marker with arrow icon
          gpsMarker = L.marker([lat, lng], {
            icon: L.divIcon({
              className: 'gps-marker-arrow',
              html: createGpsArrowIconHtml('#ffaa00'),
              iconSize: [50, 50],
              iconAnchor: [25, 25]
            }),
            pane: 'gpsPane'
          }).addTo(map).bindPopup('IP-based position (approximate)', {
            closeButton: true
          }).openPopup();
          updateGpsMarkerHeading();

          map.setView([lat, lng], Math.max(map.getZoom(), 12));
          flashBtn(btn, '#ffaa00');
          sendGpsToServer(lat, lng);
          return true;
        } catch (fetchError) {
          // Check if it's an abort error (timeout)
          if (fetchError.name === 'AbortError') {
            throw new Error(`IP-Service Timeout (${IP_GEOLOCATION_TIMEOUT_MS / 1000}s) - probably no internet available`);
          }
          throw fetchError;
        }
      } catch (e) {
        if (DEBUG_MODE) {
          console.warn('IP fallback failed (normal on local networks):', e.message || e);
        }
        // Silently fall back to manual coordinate prompt - don't show error for local network usage
        manualCoordinatePrompt();
        return false;
      }
    }

    function manualCoordinatePrompt() {

    }

    // Status menu toggle
    // Set status and update UI with BroadcastChannel sync
    function setStatus(status, color) {
      const el = document.getElementById('out-status');
      if (el) {
        el.innerText = status;
        el.style.color = color;
      }

      // Broadcast status update to other tabs/windows
      // updateData structure (cross-tab communication protocol):
      // - type: 'status_change' (discriminator for message type)
      // - status: Status text (e.g., 'AKTIV', 'BASE', 'KIA', 'INAKTIV')
      // - color: CSS color string for display
      // - username: Current user to prevent cross-user updates
      // - timestamp: ISO timestamp for change tracking
      const updateData = {
        type: 'status_change',
        status: status,
        color: color,
        username: currentUserName,
        timestamp: new Date().toISOString()
      };

      // BroadcastChannel (modern browsers)
      if (statusChannel) {
        try {
          statusChannel.postMessage(updateData);
        } catch (e) {
          console.warn('BroadcastChannel postMessage failed', e);
        }
      }

      // localStorage fallback for cross-window sync
      try {
        localStorage.setItem('lpu5_last_status_update', JSON.stringify(updateData));
      } catch (e) {
        console.warn('localStorage not available', e);
      }
    }

      }
    }

    // ── Make Chat Window draggable (mouse + touch) ──
    (function initChatDrag() {
      const chatWindow = document.getElementById('chat-window');
      const header = document.getElementById('chatWindowHeader');
      if (!chatWindow || !header) return;

      let isDragging = false;
      let dragOffset = { x: 0, y: 0 };

      function startDrag(clientX, clientY, e) {
        if (e.target.closest('.chat-window-btn')) return;
        isDragging = true;
        const rect = chatWindow.getBoundingClientRect();
        dragOffset.x = clientX - rect.left;
        dragOffset.y = clientY - rect.top;
        chatWindow.style.transition = 'none';
      }

      function moveDrag(clientX, clientY) {
        if (!isDragging) return;
        let newX = clientX - dragOffset.x;
        let newY = clientY - dragOffset.y;
        const maxX = window.innerWidth - chatWindow.offsetWidth;
        const maxY = window.innerHeight - chatWindow.offsetHeight;
        newX = Math.max(0, Math.min(newX, maxX));
        newY = Math.max(0, Math.min(newY, maxY));
        chatWindow.style.left = newX + 'px';
        chatWindow.style.top = newY + 'px';
        chatWindow.style.right = 'auto';
        chatWindow.style.bottom = 'auto';
      }

      function endDrag() {
        if (isDragging) {
          isDragging = false;
          chatWindow.style.transition = '';
        }
      }

      // Mouse events
      header.addEventListener('mousedown', function (e) { startDrag(e.clientX, e.clientY, e); });
      document.addEventListener('mousemove', function (e) { moveDrag(e.clientX, e.clientY); });
      document.addEventListener('mouseup', endDrag);

      // Touch events
      header.addEventListener('touchstart', function (e) {
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY, e);
      });
      document.addEventListener('touchmove', function (e) {
        if (!isDragging) return;
        e.preventDefault();
        const t = e.touches[0];
        moveDrag(t.clientX, t.clientY);
      }, { passive: false });
      document.addEventListener('touchend', endDrag);
    })();

    function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const recipient = document.getElementById('chat-recipient');
      const messagesDiv = document.getElementById('chat-messages');

      if (!input || !recipient || !messagesDiv) return;

      const message = input.value.trim();
      if (!message) return;

      // Clear initial "no messages" placeholder if present
      const placeholder = messagesDiv.querySelector('.chat-placeholder');
      if (placeholder) placeholder.remove();

      // Create message element with outgoing style
      const messageEl = document.createElement('div');
      messageEl.className = 'chat-message outgoing';
      messageEl.setAttribute('data-pending', 'true');
      const senderName = currentUserName || sessionStorage.getItem('currentUser') || 'Me';
      const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      messageEl.innerHTML = `
    <div class="chat-message-header">
      <span class="chat-message-sender">${_escapeHtml(senderName)}</span>
      <span class="chat-message-time">${time}</span>
    </div>
    <div class="chat-message-text">${_escapeHtml(message)}</div>
    <div class="chat-msg-status" style="text-align:right;font-size:0.7em;color:#888;">&#9711;</div>
  `;

      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      // Clear input
      input.value = '';

      // Broadcast to other tabs via localStorage (cross-tab fallback for admin_map.html)
      try {
        const broadcastData = JSON.stringify({ sender: senderName, text: message, timestamp: Date.now(), source: 'overview' });
        localStorage.setItem('lpu5_broadcast_message', broadcastData);
      } catch (e) { }

      // Send message to server via API, with automatic COT fallback
      const channelId = recipient.value || 'all';
      const token = localStorage.getItem('token') || sessionStorage.getItem('token');

      // Helper: send via Meshtastic COT as fallback
      function sendViaMeshtasticCOT(msgEl) {
        if (meshtasticConnected && meshtasticClient) {
          const mapCenter = map ? map.getCenter() : null;
          // Send as COT with position if available, otherwise as plain text
          let sendPromise;
          if (mapCenter) {
            const cotEvent = new COTEvent({
              lat: mapCenter.lat,
              lon: mapCenter.lng,
              callsign: currentUserName || 'MESH-USER',
              remarks: message
            });
            sendPromise = meshtasticClient.sendCOT(cotEvent.toXML());
          } else {
            sendPromise = meshtasticClient.sendText(message);
          }
          sendPromise.then(() => {
            console.log('[Chat] Message sent via Meshtastic COT fallback');
            const statusEl = msgEl.querySelector('.chat-msg-status');
            if (statusEl) { statusEl.innerHTML = '📡'; statusEl.title = 'Gesendet via Meshtastic COT'; }
          }).catch(cotErr => {
            console.error('[Chat] Meshtastic COT fallback also failed:', cotErr);
            const statusEl = msgEl.querySelector('.chat-msg-status');
            if (statusEl) { statusEl.innerHTML = '&#10007;'; statusEl.style.color = '#f44'; }
          });
        } else {
          // No Meshtastic connection, queue for later
          if (messageQueue) {
            messageQueue.addPendingMessage({ text: message, type: 'cot', timestamp: Date.now() });
            const statusEl = msgEl.querySelector('.chat-msg-status');
            if (statusEl) { statusEl.innerHTML = '⏳'; statusEl.title = 'In queue'; }
          } else {
            const statusEl = msgEl.querySelector('.chat-msg-status');
            if (statusEl) { statusEl.innerHTML = '&#10007;'; statusEl.style.color = '#f44'; }
          }
        }
      }

      if (!token || !navigator.onLine) {
        // No token or offline: send directly via Meshtastic COT
        console.log('[Chat] No server connection, using Meshtastic COT');
        sendViaMeshtasticCOT(messageEl);
        return;
      }
      const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
      fetch('/api/chat/message', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({ channel_id: channelId, text: message })
      })
      .then(r => {
        if (!r.ok) throw new Error('Server responded with ' + r.status);
        return r.json();
      })
      .then(result => {
        if (result.status === 'success' && result.message) {
          messageEl.setAttribute('data-msg-id', result.message.id);
          messageEl.removeAttribute('data-pending');
          _sentChatMessageIds.add(String(result.message.id));
          setTimeout(() => _sentChatMessageIds.delete(String(result.message.id)), 30000);
          const statusEl = messageEl.querySelector('.chat-msg-status');
          if (statusEl) statusEl.innerHTML = '&#10003;'; // single check = sent
        }
      })
      .catch(e => {
        console.error('Failed to send chat message via server, falling back to COT:', e);
        sendViaMeshtasticCOT(messageEl);
      });
    }

    function loadChatUsers() {
      // Load channels from API for chat recipient dropdown
      const token = localStorage.getItem('token') || sessionStorage.getItem('token');
      if (!token) return Promise.resolve();

      const select = document.getElementById('chat-recipient');
      if (!select) return Promise.resolve();

      return fetch('/api/chat/channels', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(r => {
          if (!r.ok) throw new Error('Failed to load channels: ' + r.status);
          return r.json();
        })
        .then(result => {
          const channels = (result && result.channels) ? result.channels : [];
          select.innerHTML = '';
          if (channels.length === 0) {
            const allOpt = document.createElement('option');
            allOpt.value = 'all';
            allOpt.textContent = 'All Units';
            allOpt.setAttribute('data-channel-name', 'All Units');
            select.appendChild(allOpt);
          } else {
            channels.forEach(ch => {
              const opt = document.createElement('option');
              opt.value = ch.id;
              opt.textContent = ch.name || ch.id;
              opt.setAttribute('data-channel-name', ch.name || ch.id);
              if (ch.color) opt.style.color = ch.color;
              select.appendChild(opt);
            });
          }
          // Also load user list for direct messages
          return fetch('/api/users', { headers: { 'Authorization': 'Bearer ' + token } });
        })
        .then(r => (r && r.ok) ? r.json() : [])
        .then(users => {
          if (!users || !Array.isArray(users)) return;
          users.forEach(user => {
            const opt = document.createElement('option');
            opt.value = user.id;
            opt.textContent = user.username || user.unit || user.id;
            opt.setAttribute('data-channel-name', user.username || user.unit || user.id);
            select.appendChild(opt);
          });
        })
        .catch(err => {
          console.error('Error loading channels/users for chat:', err);
          if (select && select.options.length === 0) {
            select.innerHTML = '<option value="all">All Units</option>';
          }
        });
    }

    function loadChatMessages() {
      const token = localStorage.getItem('token') || sessionStorage.getItem('token');
      if (!token) return;
      const select = document.getElementById('chat-recipient');
      const channelId = (select && select.value) ? select.value : 'all';
      const messagesDiv = document.getElementById('chat-messages');
      if (!messagesDiv) return;
      // Clear unread count for the channel now being viewed
      delete chatUnreadByChannel[channelId];
      updateChatNotificationBadge();

      fetch('/api/chat/messages/' + encodeURIComponent(channelId), {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(r => r.json())
        .then(result => {
          const messages = (result && result.messages) ? result.messages : [];
          const selfName = currentUserName || sessionStorage.getItem('currentUser') || '';
          messagesDiv.innerHTML = '';
          if (messages.length === 0) {
            messagesDiv.innerHTML = '<div class="chat-placeholder"><i class="fas fa-comments" style="font-size: 2rem; margin-bottom: 10px; color: #666;"></i><div style="color: #666;">No messages</div><small style="color: #555; margin-top: 5px;">Chat and COT messages will appear here</small></div>';
            return;
          }
          messages.forEach(msg => {
            const isOutgoing = msg.username === selfName;
            const messageEl = document.createElement('div');
            messageEl.className = 'chat-message ' + (isOutgoing ? 'outgoing' : 'incoming');
            messageEl.setAttribute('data-msg-id', msg.id || '');
            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'}) : '';
            let statusHtml = '';
            if (isOutgoing) {
              let icon = '&#10003;', color = '#888';
              if (msg.read_by && msg.read_by.length > 0) { icon = '&#10003;&#10003;'; color = '#4fc3f7'; }
              else if (msg.delivered_to && msg.delivered_to.length > 0) { icon = '&#10003;&#10003;'; }
              statusHtml = '<div class="chat-msg-status" style="text-align:right;font-size:0.7em;color:' + color + ';">' + icon + '</div>';
            }
            messageEl.innerHTML = '<div class="chat-message-header"><span class="chat-message-sender">' + _escapeHtml(msg.username || 'Unknown') + '</span><span class="chat-message-time">' + time + '</span></div>' + _renderChatMsgContent(msg) + statusHtml;
            messagesDiv.appendChild(messageEl);
          });
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
          // Mark messages as read
          const unreadIds = messages.filter(m => m.username !== selfName && m.id).map(m => m.id);
          if (unreadIds.length > 0) {
            fetch('/api/chat/messages/mark-read', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
              body: JSON.stringify({ message_ids: unreadIds })
            }).catch(() => {});
          }
        })
        .catch(e => {
          console.error('Error loading chat messages:', e);
        });
    }

    function createChatChannel() {
      var name = prompt('New channel – Enter name:');
      if (!name || !name.trim()) return;
      name = name.trim();
      var color = prompt('Color (Hex, e.g. #ff9900):', '#ffffff');
      if (!color || !/^#[0-9A-Fa-f]{6}$/.test(color)) color = '#ffffff';
      var description = prompt('Description (optional):', '');
      var token = localStorage.getItem('token') || sessionStorage.getItem('token');

      fetch('/api/chat/channels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ name: name, color: color, description: description || '' })
      })
        .then(function (r) {
          if (!r.ok) return r.json().then(function (d) { throw new Error(d.detail || r.status); });
          return r.json();
        })
        .then(function (result) {

            var sel = document.getElementById('chat-recipient');
            if (sel && result.channel) sel.value = result.channel.id;

        .catch(function (e) { alert('Failed to create channel: ' + e.message); });

      var channelId = sel.value;

      var token = localStorage.getItem('token') || sessionStorage.getItem('token');

      fetch('/api/chat/channels/' + encodeURIComponent(channelId), {

        headers: { 'Authorization': 'Bearer ' + token }

        .then(function (r) {
          if (!r.ok) return r.json().then(function (d) { throw new Error(d.detail || r.status); });

          if (typeof loadChatUsers === 'function') loadChatUsers().then(function () { loadChatMessages(); });

        chatInput.addEventListener('keypress', function (e) {

            e.preventDefault();
            sendChatMessage();
          }
        });
      }

      // Listen for status updates from other tabs via BroadcastChannel
      if (statusChannel) {
        statusChannel.addEventListener('message', (event) => {
          const data = event.data;
          if (data.type === 'status_change') {
            // Update own status display if it concerns the current user
            if (data.username === currentUserName) {
              const outStatus = document.getElementById('out-status');
              if (outStatus) {
                outStatus.textContent = data.status;
                outStatus.style.color = data.color;
              }
            }
            // Refresh map data to reflect any status changes
            sync();
          }
        });

        // Cleanup handler: close BroadcastChannel when page unloads
        window.addEventListener('beforeunload', () => {
          if (statusChannel) {
            statusChannel.close();
          }
        });
      }

      // localStorage listener (fallback for older browsers)
      window.addEventListener('storage', (e) => {
        if (e.key === 'lpu5_last_status_update' && e.newValue) {
          try {
            const data = JSON.parse(e.newValue);
            // Update own status display if it concerns the current user
            if (data.username === currentUserName) {
              const outStatus = document.getElementById('out-status');
              if (outStatus) {
                outStatus.textContent = data.status;
                outStatus.style.color = data.color;
              }
            }
            // Refresh map data to reflect any status changes
            sync();
          } catch (err) {
            console.warn('Failed to parse status update', err);
          }
        }

        // Cross-tab chat message fallback (receives broadcasts from admin_map.html)
        if (e.key === 'lpu5_broadcast_message' && e.newValue) {
          try {
            const data = JSON.parse(e.newValue);
            // Ignore messages sent from this page
            if (data.source === 'overview') return;
            const selfName = currentUserName || sessionStorage.getItem('currentUser') || '';
            if (data.sender === selfName) return;
            const messagesDiv = document.getElementById('chat-messages');
            if (!messagesDiv) return;
            // Deduplicate: skip if already received via WebSocket
            const _dedupKey = _chatDedupKey(data.sender, data.text, data.timestamp);
            if (_recentChatKeys.has(_dedupKey)) return;
            _recentChatKeys.add(_dedupKey);
            setTimeout(() => _recentChatKeys.delete(_dedupKey), 10000);
            // Clear placeholder if present
            const _ph2 = messagesDiv.querySelector('.chat-placeholder');
            if (_ph2) _ph2.remove();
            const messageEl = document.createElement('div');
            messageEl.className = 'chat-message incoming';

    (function () {

        if (!el) return;

      }
      updateTopClock();

      // Battery
      if (typeof navigator.getBattery === 'function') {
        navigator.getBattery().then(function (battery) {
          function updateBattery() {
            const levelEl = document.getElementById('tsb-battery-level');
            const iconEl = document.getElementById('tsb-battery-icon');
            if (!levelEl || !iconEl) return;
            const pct = Math.round(battery.level * 100);
            levelEl.textContent = pct + '%';
            if (battery.charging) {
              iconEl.className = 'fas fa-plug';
            } else if (pct >= 75) {
              iconEl.className = 'fas fa-battery-full';
            } else if (pct >= 50) {

            } else if (pct >= 25) {
              iconEl.className = 'fas fa-battery-half';
            } else {
              iconEl.className = 'fas fa-battery-empty';
            }
          }
          updateBattery();
          battery.addEventListener('levelchange', updateBattery);
          battery.addEventListener('chargingchange', updateBattery);
        }).catch(function () {
          const levelEl = document.getElementById('tsb-battery-level');
          if (levelEl) levelEl.textContent = '';
        });
      } else {
        const levelEl = document.getElementById('tsb-battery-level');
        if (levelEl) levelEl.textContent = '';
      }

      // Network
      function updateNetworkStatus() {
        const iconEl = document.getElementById('tsb-network-icon');
        const typeEl = document.getElementById('tsb-network-type');
        if (!iconEl || !typeEl) return;
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (!navigator.onLine) {
          iconEl.className = 'fas fa-times-circle';
          typeEl.textContent = 'OFFLINE';
          return;
        }
        if (conn && (conn.effectiveType || conn.type)) {
          typeEl.textContent = (conn.effectiveType || conn.type).toUpperCase();
        } else {
          typeEl.textContent = 'ONLINE';
        }
        iconEl.className = 'fas fa-signal';
      }
      updateNetworkStatus();
      window.addEventListener('online', updateNetworkStatus);
      window.addEventListener('offline', updateNetworkStatus);
      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (conn) conn.addEventListener('change', updateNetworkStatus);

      // ─── Server Connection Status (Online / COT / Offline) ────────
      // Tracks whether ANY server is reachable via internet.
      // Green "Online"  = server reachable via HTTP(S)
      // Orange "COT"    = COT/mesh only (server not reachable but active Meshtastic BLE connection)
      // Red "Offline"   = no connection at all
      var _connStatus = 'offline'; // 'online' | 'cot' | 'offline'

      function _updateConnStatusUI() {
        var el = document.getElementById('tsb-conn-status');
        var iconEl = document.getElementById('tsb-network-icon');
        if (!el) return;
        if (_connStatus === 'online') {
          el.textContent = 'Online';
          el.style.color = '#2ecc71';
          if (iconEl) { iconEl.className = 'fas fa-signal'; iconEl.style.color = '#2ecc71'; }
        } else if (_connStatus === 'cot') {
          el.textContent = 'COT';
          el.style.color = '#f39c12';
          if (iconEl) { iconEl.className = 'fas fa-satellite-dish'; iconEl.style.color = '#f39c12'; }
        } else {
          el.textContent = 'Offline';
          el.style.color = '#e74c3c';
          if (iconEl) { iconEl.className = 'fas fa-times-circle'; iconEl.style.color = '#e74c3c'; }
        }
      }

      function _checkServerConnStatus() {
        // Check all known servers for internet reachability
        var servers = [];
        try { servers = JSON.parse(localStorage.getItem('lpu5_nw_servers') || '[]'); } catch(e) {}
        // Also check the current page's server (local)
        var urls = [window.location.protocol + '//' + window.location.host + '/api/health'];
        for (var i = 0; i < servers.length; i++) {
          if (servers[i].url) urls.push(servers[i].url + '/api/health');
        }
        // Deduplicate
        var seen = {};
        var uniqueUrls = [];
        for (var j = 0; j < urls.length; j++) {
          if (!seen[urls[j]]) { seen[urls[j]] = true; uniqueUrls.push(urls[j]); }
        }

        var anyOnline = false;
        var pending = uniqueUrls.length;
        if (pending === 0) {
          _connStatus = 'offline';
          _updateConnStatusUI();
          return;
        }
        for (var k = 0; k < uniqueUrls.length; k++) {
          (function(url) {
            var ctrl = new AbortController();
            var to = setTimeout(function() { ctrl.abort(); }, 5000);
            fetch(url, { signal: ctrl.signal }).then(function(r) {
              clearTimeout(to);
              if (r.ok) anyOnline = true;
            }).catch(function() {
              clearTimeout(to);
            }).finally(function() {
              pending--;
              if (pending <= 0) {
                if (anyOnline) {
                  _connStatus = 'online';
                } else if (typeof meshtasticConnected !== 'undefined' && meshtasticConnected) {
                  _connStatus = 'cot';
                } else {
                  _connStatus = 'offline';
                }
                _updateConnStatusUI();
              }
            });
          })(uniqueUrls[k]);
        }
      }

      // Run check immediately and every 30 seconds
      _checkServerConnStatus();
      setInterval(_checkServerConnStatus, 30000);
      window.addEventListener('online', function() { setTimeout(_checkServerConnStatus, 1000); });
      window.addEventListener('offline', function() { _connStatus = 'offline'; _updateConnStatusUI(); });
    })();

    /* ----------------- STATUS BROADCAST (overview) -----------------
       Wraps setStatus to broadcast status-change across tabs (BroadcastChannel + storage fallback).
       Also listens for incoming status-change and applies UI update.
    */
    (function () {
      const CHANNEL = 'lpu5_global_status';
      let bc = null;
      try {
        bc = new BroadcastChannel(CHANNEL);
        bc.onmessage = (e) => { if (e.data && e.data.type === 'status-change') applyRemoteStatus(e.data.status); };
      } catch (e) { }

      window.addEventListener('storage', (ev) => {
        if (ev.key === 'lpu5_status' && ev.newValue) {
          try {
            const msg = JSON.parse(ev.newValue);
            if (msg && msg.type === 'status-change') applyRemoteStatus(msg.status);
          } catch (e) { }
        }
      });

      function broadcastStatus(status) {
        const msg = { type: 'status-change', status };
        if (bc) try { bc.postMessage(msg); } catch (e) { }
        try { localStorage.setItem('lpu5_status', JSON.stringify(msg)); } catch (e) { }
      }

      function applyRemoteStatus(status) {
        const el = document.getElementById('out-status');
        if (!el) return;
        el.innerText = status;
        let color = '';
        if (status === 'AKTIV') color = '#28a745';
        else if (status === 'BASE') color = '#007bff';
        else if (status === 'KIA') color = '#dc3545';
        el.style.color = color;
      }

      // wrap existing setStatus
      const origSetStatus = window.setStatus;
      window.setStatus = function (status, color) {
        try { if (typeof origSetStatus === 'function') origSetStatus(status, color); } catch (e) { }
        try { broadcastStatus(status); } catch (e) { console.warn('broadcast failed', e); }
      };

      // initialize from last known
      try {
        const last = JSON.parse(localStorage.getItem('lpu5_status') || 'null');
        if (last && last.type === 'status-change') applyRemoteStatus(last.status);
      } catch (e) { }
    })();

    /* ----------------- LIFE STATUS FUNCTIONS -----------------
       Functions for setting life status (Active, Base, KIA)
    */
    window.setLifeStatus = async function (status) {
      console.log('Setting life status to:', status);

      try {
        // Use currentUserName as default userId; try /api/me only if token is available
        let userId = currentUserName || localStorage.getItem('lpu5_username') || localStorage.getItem('lpu5_cached_user');

        if (!userId) {
          alert('Please login first');
          return;
        }

        const token = localStorage.getItem('token');
        if (token) {
          try {
            const userRes = await fetch('/api/me', {
              headers: { 'Authorization': `Bearer ${token}` }
            });
            if (userRes.ok) {
              const userData = await userRes.json();
              userId = userData.id || userData.username || userId;
            }
          } catch (e) {
            console.warn('Could not get user info from /api/me, using cached username:', e);
          }
        }

        // Update the visual life indicator immediately
        const statusElement = document.getElementById('out-status');
        if (statusElement) {
          statusElement.textContent = status;
          if (status === 'AKTIV') {
            statusElement.style.color = '#28a745'; // green
          } else if (status === 'BASE') {
            statusElement.style.color = '#007bff'; // blue
          } else if (status === 'KIA') {
            statusElement.style.color = '#dc3545'; // red
          }
        }

        // Update status via API
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const statusRes = await fetch(`/api/status/${encodeURIComponent(userId)}/${encodeURIComponent(status)}`, {
          method: 'POST',
          headers
        });

        if (statusRes.ok) {
          console.log('Status updated successfully');
        } else {
          console.warn('Status API returned non-OK status:', statusRes.status);
        }

        // Persist status to localStorage for page reload
        try {
          localStorage.setItem('lpu5_status', JSON.stringify({ type: 'status-change', status: status }));
        } catch (e) { }

        // Broadcast to other tabs (index.html) via BroadcastChannel and localStorage
        const color = statusElement ? statusElement.style.color : '';
        const updateData = {
          type: 'status_change',
          status: status,
          color: color,
          username: currentUserName || userId,
          timestamp: new Date().toISOString()
        };
        if (statusChannel) {
          try { statusChannel.postMessage(updateData); } catch (e) { }
        }
        try {
          localStorage.setItem('lpu5_last_status_update', JSON.stringify(updateData));
        } catch (e) { }

        // Also broadcast via setStatus to ensure lpu5_global_status channel is updated
        try { if (typeof setStatus === 'function') setStatus(status, color); } catch (e) { }

        // Visual feedback on toolbar buttons if they exist
        document.querySelectorAll('[id^="s-status-"]').forEach(btn => btn.classList.remove('active'));
        const statusBtn = document.getElementById(`s-status-${status.toLowerCase()}`);
        if (statusBtn) statusBtn.classList.add('active');
      } catch (error) {
        console.error('Error setting life status:', error);
        alert('Error updating status');
      }
      
      // Close the popup after setting status
      closeMenuPopup();
    };

    // ─── Contacts: Known Contacts List ───────────────────────────────
    // Collects all seen/heard contacts from serverMarkerLayers (ATAK/CoT),
    // meshtasticMarkers (mesh nodes), and symbolLayers (GPS positions).
    // Persisted in localStorage so contacts survive page reloads.
    var _CONTACTS_KEY = 'lpu5_contacts_seen';

    function _contactsGetStored() {
      try { return JSON.parse(localStorage.getItem(_CONTACTS_KEY) || '{}'); } catch (e) { return {}; }
    }
    function _contactsSaveStored(obj) {
      try { localStorage.setItem(_CONTACTS_KEY, JSON.stringify(obj)); } catch (e) { }
    }

    // Build a snapshot of all currently visible contacts from live map data
    function _contactsBuildList() {
      var stored = _contactsGetStored();
      var contacts = {}; // keyed by unique id

      // 1) ATAK / CoT markers from sync() → serverMarkerLayers
      for (var serverEntry of serverMarkerLayers) {
        var id = serverEntry[0], layer = serverEntry[1];
        var ll = layer.getLatLng();
        if (!ll) continue;
        var name = layer._serverId || id;
        // Try to extract name from popup content
        var popContent = '';
        try { popContent = layer.getPopup() ? layer.getPopup().getContent() : ''; } catch (ex) { }
        var nameMatch = popContent.match(/<strong>([^<]+)<\/strong>/);
        var displayName = nameMatch ? nameMatch[1] : (name || 'Unknown');
        contacts['srv_' + id] = {
          id: 'srv_' + id,
          name: _escapeHtml(displayName),
          type: 'atak',
          lat: ll.lat,
          lng: ll.lng,
          lastSeen: Date.now()
        };
      }

      // 2) Meshtastic nodes from updateMeshtasticNodes() → meshtasticMarkers
      for (var meshEntry of meshtasticMarkers) {
        var meshId = meshEntry[0], entry = meshEntry[1];
        var mll = entry.marker.getLatLng();
        if (!mll) continue;
        var nd = entry.data || {};
        var sn = nd.shortName || nd.short_name || (nd.user && nd.user.shortName) || '';
        var ln = nd.longName || nd.long_name || nd.name || (nd.user && nd.user.longName) || nd.callsign || meshId;
        contacts['mesh_' + meshId] = {
          id: 'mesh_' + meshId,
          name: _escapeHtml(ln),
          shortName: _escapeHtml(sn),
          type: 'meshtastic',
          lat: mll.lat,
          lng: mll.lng,
          lastSeen: Date.now()
        };
      }

      // 3) GPS position symbols from loadMapSymbols() → symbolLayers
      for (var symbolEntry of symbolLayers) {
        var sid = symbolEntry[0], slayer = symbolEntry[1];
        var sll = slayer.getLatLng();
        if (!sll) continue;
        var sPop = '';
        try { sPop = slayer.getPopup() ? slayer.getPopup().getContent() : ''; } catch (ex) { }
        var sNameMatch = sPop.match(/<strong>([^<]+)<\/strong>/);
        var sName = sNameMatch ? sNameMatch[1] : ('Symbol ' + sid);
        var sType = sPop.indexOf('GPS Position') !== -1 ? 'gps' : 'symbol';
        contacts['sym_' + sid] = {
          id: 'sym_' + sid,
          name: _escapeHtml(sName),
          type: sType,
          lat: sll.lat,
          lng: sll.lng,
          lastSeen: Date.now()
        };
      }

      // Merge with stored contacts (keep stored ones that are no longer live)
      for (var k in stored) {
        if (!contacts[k]) {
          stored[k]._offline = true;
          contacts[k] = stored[k];
        }
      }

      // Save updated contacts
      _contactsSaveStored(contacts);
      return contacts;
    }

    function _contactsRenderPopup() {

      var h = '';

      h += '<div style="font-size:0.8em;color:#888;margin-bottom:8px;">';
      h += '<i class="fas fa-info-circle"></i> Alle gesehenen/gehörten Kontakte';
      h += '</div>';

      if (keys.length === 0) {
        h += '<div style="color:#666;text-align:center;padding:20px;">Keine Kontakte gefunden</div>';

        // Sort: online first, then alphabetically

          if (ca._offline && !cb._offline) return 1;
          if (!ca._offline && cb._offline) return -1;
          return (ca.name || '').localeCompare(cb.name || '');
        });

        for (var i = 0; i < keys.length; i++) {

          var typeIcon = 'fas fa-question-circle';

          else if (c.type === 'symbol') { typeIcon = 'fas fa-map-marker-alt'; typeColor = '#e67e22'; typeLabel = 'Symbol'; }

          var offlineStyle = c._offline ? 'opacity:0.5;' : '';

          h += '<div style="flex:1;min-width:0;overflow:hidden;">';
          h += '<div style="font-weight:bold;font-size:0.9em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (c.name || 'Unknown') + offlineBadge + '</div>';
          h += '<div style="font-size:0.7em;color:#888;">' + typeLabel;
          if (c.shortName) h += ' · ' + c.shortName;
          h += '</div>';
          h += '</div>';
          h += '<button onclick="event.stopPropagation();_contactsZoomTo(' + c.lat + ',' + c.lng + ')" style="background:none;border:1px solid #007bff;color:#007bff;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:0.8em;flex-shrink:0" title="Zoom zur Position"><i class="fas fa-search-location"></i></button>';
          h += '<button onclick="event.stopPropagation();_contactsDelete(\'' + c.id + '\')" style="background:none;border:1px solid #e74c3c;color:#e74c3c;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:0.8em;flex-shrink:0" title="Aus Liste entfernen"><i class="fas fa-trash-alt"></i></button>';
          h += '</div>';
        }

      body.innerHTML = h;
    }

    window._contactsZoomTo = _contactsZoomTo;

    // ─── Netzwerk: Server Connection Manager ───────────────────────
    var _NW_KEY = 'lpu5_nw_servers';
    var _NW_API_INFO = '/api/federation/info';
    var _NW_API_LOGIN = '/api/login_user';
    var _NW_TEST_TIMEOUT = 5000;
    var _NW_LOGIN_TIMEOUT = 8000;
    var _nwEditingId = null;
    var _nwReconnectTimer = null;
    var _NW_RECONNECT_INTERVAL = 60000;

    function _nwEsc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function _nwGetServers() {
      try { return JSON.parse(localStorage.getItem(_NW_KEY) || '[]'); }
      catch(e) { return []; }
    }

    function _nwSaveServers(list) {
      localStorage.setItem(_NW_KEY, JSON.stringify(list));
    }

    function _nwGenId() {
      return 'nw_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    }

    function _nwShowMsg(text, type) {
      var el = document.getElementById('nw-msg');
      if (!el) return;
      var color = type === 'success' ? '#2ecc71' : type === 'error' ? '#e74c3c' : '#f39c12';
      el.style.display = 'block';
      el.style.color = color;
      el.style.fontSize = '0.85em';
      el.style.textAlign = 'center';
      el.innerHTML = text;
      setTimeout(function() { if (el) el.style.display = 'none'; }, 5000);
    }

    function _nwParseUrl(url) {
      if (!url) return { host: '', port: '', protocol: 'https' };
      try {
        var u = new URL(url);
        var proto = u.protocol.replace(':', '');
        if (proto !== 'http' && proto !== 'https' && proto !== 'tcp' && proto !== 'udp') proto = 'https';
        return { host: u.hostname, port: u.port || '', protocol: proto };
      } catch(e) { return { host: url, port: '', protocol: 'https' }; }
    }

    function _nwBuildUrl(protocol, host, port) {
      if (!host) return '';
      return protocol + '://' + host + (port ? ':' + port : '');
    }

    function _nwToggleForm(forceOpen) {
      var f = document.getElementById('nw-add-form');
      if (!f) return;
      if (forceOpen) { f.style.display = 'block'; return; }
      _nwEditingId = null;
      f.style.display = f.style.display === 'none' ? 'block' : 'none';
      if (f.style.display === 'block') {
        _nwClearForm();
        var title = document.getElementById('nw-form-title');
        if (title) title.textContent = 'Neuer Server';
        var cancelBtn = document.getElementById('nw-btn-cancel-edit');
        if (cancelBtn) cancelBtn.style.display = 'none';
      }
    }

    function _nwClearForm() {
      var fields = ['nw-inp-name', 'nw-inp-host', 'nw-inp-port', 'nw-inp-user', 'nw-inp-pass'];
      for (var i = 0; i < fields.length; i++) {
        var el = document.getElementById(fields[i]);
        if (el) el.value = '';
      }
      var proto = document.getElementById('nw-inp-proto');
      if (proto) proto.value = 'https';
    }

    function _nwEdit(id) {
      var servers = _nwGetServers();
      var srv = null;
      for (var i = 0; i < servers.length; i++) { if (servers[i].id === id) { srv = servers[i]; break; } }
      if (!srv) return;
      _nwEditingId = id;
      var f = document.getElementById('nw-add-form');
      if (f) f.style.display = 'block';
      var title = document.getElementById('nw-form-title');
      if (title) title.textContent = 'Server bearbeiten: ' + (srv.name || '');
      var cancelBtn = document.getElementById('nw-btn-cancel-edit');
      if (cancelBtn) cancelBtn.style.display = '';
      // Fill form fields
      var nameEl = document.getElementById('nw-inp-name');
      var hostEl = document.getElementById('nw-inp-host');
      var portEl = document.getElementById('nw-inp-port');
      var protoEl = document.getElementById('nw-inp-proto');
      var userEl = document.getElementById('nw-inp-user');
      var passEl = document.getElementById('nw-inp-pass');
      if (nameEl) nameEl.value = srv.name || '';
      // Parse host/port/protocol from existing data or URL
      if (srv.host) {
        if (hostEl) hostEl.value = srv.host;
        if (portEl) portEl.value = srv.port || '';
        if (protoEl) protoEl.value = srv.protocol || 'https';
      } else if (srv.url) {
        var parsed = _nwParseUrl(srv.url);
        if (hostEl) hostEl.value = parsed.host;
        if (portEl) portEl.value = parsed.port;
        if (protoEl) protoEl.value = parsed.protocol;
      } else {
        if (hostEl) hostEl.value = '';
        if (portEl) portEl.value = '';
        if (protoEl) protoEl.value = 'https';
      }
      if (userEl) userEl.value = srv.user || '';
      if (passEl) passEl.value = srv.pass || '';
      // Scroll form into view
      if (f) f.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function _nwCancelEdit() {
      _nwEditingId = null;
      var f = document.getElementById('nw-add-form');
      if (f) f.style.display = 'none';
      _nwClearForm();
    }

    function _nwSaveForm() {
      var name = (document.getElementById('nw-inp-name') || {}).value || '';
      var host = (document.getElementById('nw-inp-host') || {}).value || '';
      var port = (document.getElementById('nw-inp-port') || {}).value || '';
      var proto = (document.getElementById('nw-inp-proto') || {}).value || 'https';
      var user = (document.getElementById('nw-inp-user') || {}).value || '';
      var pass = (document.getElementById('nw-inp-pass') || {}).value || '';
      name = name.trim(); host = host.trim(); port = port.trim(); user = user.trim(); pass = pass.trim();
      if (!name) { _nwShowMsg('Bitte Server-Name eingeben.', 'error'); return; }
      var url = _nwBuildUrl(proto, host, port);
      var servers = _nwGetServers();
      if (_nwEditingId) {
        // Update existing server
        for (var i = 0; i < servers.length; i++) {
          if (servers[i].id === _nwEditingId) {
            servers[i].name = name;
            servers[i].url = url.replace(/\/+$/, '');
            servers[i].host = host;
            servers[i].port = port;
            servers[i].protocol = proto;
            servers[i].user = user;
            if (pass) servers[i].pass = pass;
            break;
          }
        }
        _nwSaveServers(servers);
        _nwShowMsg('Server "' + _nwEsc(name) + '" aktualisiert.', 'success');
        _nwEditingId = null;
      } else {
        // Add new server
        servers.push({ id: _nwGenId(), name: name, url: url.replace(/\/+$/, ''), host: host, port: port, protocol: proto, user: user, pass: pass, status: 'unknown', active: false });
        _nwSaveServers(servers);
        _nwShowMsg('Server "' + _nwEsc(name) + '" hinzugefügt.', 'success');
      }
      _nwRenderPopup();
    }

    function _nwRemove(id) {
      var servers = _nwGetServers();
      var srv = null;
      for (var i = 0; i < servers.length; i++) { if (servers[i].id === id) { srv = servers[i]; break; } }
      if (srv && srv.active && !!currentUserName) { _nwDisconnect(id); return; }
      servers = servers.filter(function(s) { return s.id !== id; });
      _nwSaveServers(servers);
      _nwRenderPopup();
    }

    function _nwRemoveTeam(id) {
      if (!confirm('Team wirklich verlassen?')) return;
      var servers = _nwGetServers();
      var srv = null;
      for (var i = 0; i < servers.length; i++) { if (servers[i].id === id) { srv = servers[i]; break; } }
      // Clear team data if this is the active team
      var team = _teamGetData();
      if (team && srv && team.team_id === srv.team_id) { _teamSaveData(null); }
      servers = servers.filter(function(s) { return s.id !== id; });
      _nwSaveServers(servers);
      _nwRenderPopup();
    }

    function _nwTest(id) {
      var servers = _nwGetServers();
      var srv = null;
      for (var i = 0; i < servers.length; i++) { if (servers[i].id === id) { srv = servers[i]; break; } }
      if (!srv) return;
      srv.status = 'checking';
      _nwSaveServers(servers);
      _nwRenderPopup();

      var testUrl = srv.url ? srv.url + _NW_API_INFO : _NW_API_INFO;
      var controller = new AbortController();
      var timeout = setTimeout(function() { controller.abort(); }, _NW_TEST_TIMEOUT);
      fetch(testUrl, { signal: controller.signal }).then(function(resp) {
        clearTimeout(timeout);
        srv.status = resp.ok ? 'ok' : 'error';
        _nwSaveServers(servers);
        _nwRenderPopup();
        _nwShowMsg(_nwEsc(srv.name) + ': ' + (resp.ok ? 'Erreichbar ✓' : 'Fehler (HTTP ' + resp.status + ')'), resp.ok ? 'success' : 'error');
      }).catch(function(e) {
        clearTimeout(timeout);
        srv.status = 'error';
        _nwSaveServers(servers);
        _nwRenderPopup();
        _nwShowMsg(_nwEsc(srv.name) + ': Nicht erreichbar', 'error');
      });
    }

    function _nwConnect(id, silent) {
      var servers = _nwGetServers();
      var srv = null;
      for (var i = 0; i < servers.length; i++) { if (servers[i].id === id) { srv = servers[i]; break; } }
      if (!srv) return;
      if (!srv.user || !srv.pass) { if (!silent) _nwShowMsg('Bitte Benutzername und Passwort eingeben.', 'error'); return; }

      servers.forEach(function(s) { s.active = false; });
      srv.status = 'checking';
      _nwSaveServers(servers);
      if (!silent) _nwRenderPopup();

      var loginUrl = srv.url ? srv.url + _NW_API_LOGIN : _NW_API_LOGIN;
      var controller = new AbortController();
      var timeout = setTimeout(function() { controller.abort(); }, _NW_LOGIN_TIMEOUT);
      fetch(loginUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: srv.user, password: srv.pass }),
        signal: controller.signal
      }).then(function(res) {
        clearTimeout(timeout);
        if (res.ok) {
          return res.json().then(function(r) {
            currentUserName = r.user.username;
            if (r.token) localStorage.setItem('token', r.token);
            localStorage.setItem('lpu5_cached_user', srv.user);
            localStorage.setItem('lpu5_cached_pass', srv.pass);
            localStorage.setItem('lpu5_username', currentUserName);
            sessionStorage.setItem('currentUser', currentUserName);
            // Auto-update callsign from server
            if (r.user.callsign) {
              localStorage.setItem('lpu5_local_callsign', r.user.callsign);
            }
            document.getElementById('out-name').innerText = currentUserName.toUpperCase();
            srv.active = true;
            srv.status = 'ok';
            srv.cot_only = false;
            _nwSaveServers(servers);
            if (!silent) closeMenuPopup();
            updateSidebarTiles();
            isLoggedIn = true;
            startDataSync();
            _nwStartReconnect();
            if (typeof _checkServerConnStatus === 'function') _checkServerConnStatus();
          });
        } else {
          // Login failed – fall back to COT if master_key present
          if (srv.cot_mesh && srv.master_key) {
            _nwCotFallback(srv, servers, silent, 'Login fehlgeschlagen – COT-Only Modus aktiv.');
          } else {
            srv.status = 'error';
            _nwSaveServers(servers);
            if (!silent) { _nwRenderPopup(); _nwShowMsg('Login fehlgeschlagen. Prüfen Sie die Anmeldedaten.', 'error'); }
          }
        }
      }).catch(function(e) {
        clearTimeout(timeout);
        // Network error – fall back to COT if master_key present
        if (srv.cot_mesh && srv.master_key) {
          _nwCotFallback(srv, servers, silent, 'Server nicht erreichbar – COT-Only Modus aktiv.');
        } else {
          srv.status = 'error';
          _nwSaveServers(servers);
          if (!silent) { _nwRenderPopup(); _nwShowMsg('Verbindungsfehler: ' + (e.message || 'Timeout'), 'error'); }
        }
      });
    }

    // COT-Only fallback: activate server in COT mode without internet verification
    function _nwCotFallback(srv, servers, silent, msg) {
      currentUserName = srv.user;
      localStorage.setItem('lpu5_cached_user', srv.user);
      localStorage.setItem('lpu5_cached_pass', srv.pass);
      localStorage.setItem('lpu5_username', srv.user);
      sessionStorage.setItem('currentUser', srv.user);
      document.getElementById('out-name').innerText = srv.user.toUpperCase();
      srv.active = true;
      srv.status = 'cot';
      srv.cot_only = true;
      _nwSaveServers(servers);
      if (!silent) { _nwRenderPopup(); _nwShowMsg(msg, 'success'); }
      updateSidebarTiles();
      isLoggedIn = true;
      _nwStartReconnect();
      if (typeof _checkServerConnStatus === 'function') _checkServerConnStatus();
    }

    function _nwDisconnect(id) {
      _nwStopReconnect();
      stopDataSync();
      localStorage.removeItem('token');
      localStorage.removeItem('lpu5_cached_user');
      localStorage.removeItem('lpu5_cached_pass');
      currentUserName = '';
      isLoggedIn = false;
      document.getElementById('out-name').innerText = '---';
      var servers = _nwGetServers();
      servers.forEach(function(s) { s.active = false; });
      var srv = null;
      for (var i = 0; i < servers.length; i++) { if (servers[i].id === id) { srv = servers[i]; break; } }
      if (srv) srv.status = 'unknown';
      _nwSaveServers(servers);
      updateSidebarTiles();
      _nwRenderPopup();
    }

    function _nwDecodeQr(input) {
      var file = input && input.files && input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.getElementById('nw-qr-canvas');
          if (!canvas) { _nwShowMsg('Canvas nicht gefunden.', 'error'); return; }
          var ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          if (typeof jsQR === 'undefined') {
            _nwShowMsg('QR-Bibliothek nicht geladen. Bitte Seite neu laden.', 'error');
            return;
          }
          var code = jsQR(imageData.data, canvas.width, canvas.height);
          if (!code) { _nwShowMsg('Kein QR-Code erkannt. Bitte deutlicheres Bild verwenden.', 'error'); return; }
          _nwProcessQrString(code.data);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    /** Process a decoded QR string (shared by file upload and camera scanner) */
    function _nwProcessQrString(qrString) {
      try {
        var data = JSON.parse(qrString);

        // ── Handle Team QR codes (with server connection info) ──
        if (data.type === 'cot_team' && data.team_id && data.team_name) {
          var hasServerInfo = !!(data.host);
          if (hasServerInfo) {
            // Server info present – prompt for Callsign + Password (self-certification)
            _teamEnsureCredentials(function(callsign, password) {
              var host = data.host || '';
              var port = data.port ? String(data.port) : '8101';
              var protocol = data.protocol || 'https';
              var url = _nwBuildUrl(protocol, host, port);

              var teamData = {
                type: 'cot_team',
                team_name: data.team_name,
                team_id: data.team_id,
                created_by: data.created_by || '',
                members: [callsign],
                joined_at: new Date().toISOString(),
                host: host,
                port: data.port || 8101,
                protocol: protocol,
                ssl: !!data.ssl
              };
              if (data.cot_tcp_port) teamData.cot_tcp_port = data.cot_tcp_port;
              if (data.cot_udp_port) teamData.cot_udp_port = data.cot_udp_port;
              if (data.all_ips) teamData.all_ips = data.all_ips;
              _teamSaveData(teamData);

              // Store COT ports if provided
              if (data.cot_tcp_port) localStorage.setItem('lpu5_cot_tcp_port', String(data.cot_tcp_port));
              if (data.cot_udp_port) localStorage.setItem('lpu5_cot_udp_port', String(data.cot_udp_port));

              // Add team server entry to Netzwerk list (with real connection data)
              var existingServers = _nwGetServers();
              var alreadyExists = false;
              for (var t = 0; t < existingServers.length; t++) {
                if (existingServers[t].team_id === data.team_id) { alreadyExists = true; break; }
              }
              if (!alreadyExists) {
                existingServers.push({
                  id: data.team_id,
                  name: data.team_name,
                  url: url.replace(/\/+$/, ''),
                  host: host,
                  port: port,
                  protocol: protocol,
                  user: callsign,
                  pass: password,
                  status: 'unknown',
                  active: false,
                  is_team: true,
                  team_id: data.team_id,
                  team_data: teamData
                });
                _nwSaveServers(existingServers);
              }
              _nwRenderPopup();
              _nwShowMsg('Team "' + _nwEsc(data.team_name) + '" beigetreten! Verbinde mit Server...', 'success');
              // Auto-connect to the team host server
              setTimeout(function() { _nwConnect(data.team_id); }, 300);
            });
          } else {
            // Legacy / no server info – fallback to COT-only join with callsign only
            _teamEnsureCallsign(function(callsign) {
              var teamData = {
                type: 'cot_team',
                team_name: data.team_name,
                team_id: data.team_id,
                created_by: data.created_by || '',
                members: [callsign],
                joined_at: new Date().toISOString()
              };
              _teamSaveData(teamData);
              var existingServers = _nwGetServers();
              var alreadyExists = false;
              for (var t = 0; t < existingServers.length; t++) {
                if (existingServers[t].team_id === data.team_id) { alreadyExists = true; break; }
              }
              if (!alreadyExists) {
                existingServers.push({
                  id: data.team_id,
                  name: data.team_name,
                  url: '',
                  host: '',
                  port: '',
                  protocol: 'cot',
                  user: callsign,
                  pass: '',
                  status: 'ok',
                  active: false,
                  is_team: true,
                  team_id: data.team_id,
                  team_data: teamData
                });
                _nwSaveServers(existingServers);
              }
              _nwRenderPopup();
              _nwShowMsg('Team "' + _nwEsc(data.team_name) + '" beigetreten (COT-Only).', 'success');
            });
          }
          return;
        }

        // ── COT Mesh Login QR Code ──
        if (data.type === 'cot_mesh_login') {
          var host = data.host || '';
          var masterKey = data.master_key || '';
          if (!host || !masterKey) {
            _nwShowMsg('Ungültiger COT Mesh QR-Code: Host oder Master-Key fehlt.', 'error');
            return;
          }
          var port = data.port ? String(data.port) : '8101';
          var protocol = data.protocol || 'https';
          var name = data.name || 'COT Mesh Server';
          var cotTcpPort = data.cot_tcp_port || 8088;
          var cotUdpPort = data.cot_udp_port || 4242;
          var url = _nwBuildUrl(protocol, host, port);

          // Store master key for COT fallback authorization
          if (masterKey) {
            localStorage.setItem('lpu5_cot_mesh_key', masterKey);
          }
          localStorage.setItem('lpu5_cot_tcp_port', String(cotTcpPort));
          localStorage.setItem('lpu5_cot_udp_port', String(cotUdpPort));

          var servers = _nwGetServers();
          servers.push({
            id: _nwGenId(), name: name, url: url.replace(/\/+$/, ''),
            host: host, port: port, protocol: protocol,
            user: '', pass: '',
            status: 'unknown', active: false,
            cot_mesh: true, master_key: masterKey,
            cot_tcp_port: cotTcpPort, cot_udp_port: cotUdpPort
          });
          _nwSaveServers(servers);
          _nwRenderPopup();
          _nwShowMsg('COT Mesh Server "' + _nwEsc(name) + '" hinzugefügt. Bitte Benutzerdaten eingeben.', 'success');
          // Auto-open edit form so user can enter credentials
          var lastSrv = servers[servers.length - 1];
          setTimeout(function() { _nwEdit(lastSrv.id); }, 200);
          return;
        }

        // ── Standard server QR Code ──
        var name = data.name || data.server_name || data.hostname || 'Server';
        var url  = data.url  || data.server_url  || '';
        var user = data.user || data.username || data.callsign || '';
        var pass = data.pass || data.password || '';
        var port = data.port || '';
        var protocol = data.protocol || 'https';
        var host = data.host || '';
        if (!host && url) { var parsed = _nwParseUrl(url); host = parsed.host; if (!port) port = parsed.port; protocol = parsed.protocol; }
        if (!url && host) { url = _nwBuildUrl(protocol, host, port); }
        var servers = _nwGetServers();
        servers.push({ id: _nwGenId(), name: name, url: url.replace(/\/+$/, ''), host: host, port: port ? String(port) : '', protocol: protocol, user: user, pass: pass, status: 'unknown', active: false });
        _nwSaveServers(servers);
        _nwRenderPopup();
        _nwShowMsg('Server "' + _nwEsc(name) + '" via QR hinzugefügt.', 'success');
      } catch(ex) {
        _nwShowMsg('QR-Code konnte nicht gelesen werden. Ungültiges Format.', 'error');
      }
    }

    // ─── Live Camera QR Scanner ────────────────────────────────────
    var _nwQrCameraStream = null;
    var _nwQrScanTimer = null;

    function _nwScanQrCamera() {
      var body = document.getElementById('menu-popup-body');
      if (!body) return;

      // If already scanning, stop
      if (_nwQrCameraStream) { _nwStopQrCamera(); _nwRenderPopup(); return; }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        _nwShowMsg('Kamera nicht verfügbar. Bitte QR-Bild-Datei verwenden.', 'error');
        return;
      }

      // Save popup content and show scanner UI
      var prevHtml = body.innerHTML;

      var h = '';
      h += '<div style="text-align:center;margin-bottom:10px;">';
      h += '<i class="fas fa-camera" style="font-size:1.5rem;color:var(--accent-blue);margin-bottom:4px;display:block;"></i>';
      h += '<div style="color:#ccc;font-size:0.9em;font-weight:bold;">QR-Code Scanner</div>';
      h += '<div style="color:#888;font-size:0.75em;margin-top:2px;">Halte den QR-Code vor die Kamera</div>';
      h += '</div>';
      h += '<div style="position:relative;width:100%;max-width:320px;margin:0 auto;border-radius:10px;overflow:hidden;border:2px solid var(--accent-blue);">';
      h += '<video id="nw-qr-video" autoplay playsinline muted style="width:100%;display:block;background:#000;min-height:240px;"></video>';
      h += '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60%;height:60%;border:2px solid rgba(46,204,113,0.6);border-radius:8px;pointer-events:none;"></div>';
      h += '</div>';
      h += '<canvas id="nw-qr-scan-canvas" style="display:none;"></canvas>';
      h += '<div id="nw-qr-scan-status" style="text-align:center;margin-top:8px;font-size:0.78em;color:#888;">';
      h += '<i class="fas fa-spinner fa-spin"></i> Scanne...</div>';
      h += '<button class="menu-btn" style="margin-top:10px;justify-content:center;" onclick="event.stopPropagation();_nwStopQrCamera();_nwRenderPopup()">';
      h += '<i class="fas fa-times"></i> Scanner schließen</button>';
      body.innerHTML = h;

      var video = document.getElementById('nw-qr-video');
      if (!video) return;

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(function(stream) {
          _nwQrCameraStream = stream;
          video.srcObject = stream;
          video.play();
          // Start scanning frames
          _nwQrScanTimer = setInterval(function() {
            _nwScanQrFrame(video);
          }, 300);
        })
        .catch(function(err) {
          _nwStopQrCamera();
          _nwRenderPopup();
          _nwShowMsg('Kamera-Zugriff verweigert: ' + (err.message || err) + '. Bitte QR-Bild verwenden.', 'error');
        });
    }

    function _nwScanQrFrame(video) {
      if (!video || video.readyState < 2) return;
      var canvas = document.getElementById('nw-qr-scan-canvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      if (typeof jsQR === 'undefined') return;
      var code = jsQR(imageData.data, canvas.width, canvas.height);
      if (code && code.data) {
        // QR code found! Stop scanning and process
        _nwStopQrCamera();
        _nwRenderPopup();
        _nwProcessQrString(code.data);
      }
    }

    function _nwStopQrCamera() {
      if (_nwQrScanTimer) { clearInterval(_nwQrScanTimer); _nwQrScanTimer = null; }
      if (_nwQrCameraStream) {
        _nwQrCameraStream.getTracks().forEach(function(t) { t.stop(); });
        _nwQrCameraStream = null;
      }
    }

    // ─── Auto-Reconnect ────────────────────────────────────────────
    function _nwStartReconnect() {
      _nwStopReconnect();
      _nwReconnectTimer = setInterval(function() {
        var servers = _nwGetServers();
        var activeServer = null;
        for (var i = 0; i < servers.length; i++) { if (servers[i].active) { activeServer = servers[i]; break; } }
        if (!activeServer) { _nwStopReconnect(); return; }
        var healthUrl = activeServer.url ? activeServer.url + '/api/health' : '/api/health';
        var controller = new AbortController();
        var timeout = setTimeout(function() { controller.abort(); }, _NW_TEST_TIMEOUT);
        fetch(healthUrl, { signal: controller.signal }).then(function(r) {
          clearTimeout(timeout);
          if (!r.ok) throw new Error('not ok');
          // Server reachable – if currently in COT-only mode, try full login
          if (activeServer.cot_only) {
            console.log('[Netzwerk] Internet verfügbar – versuche Login für COT-Only Server...');
            _nwConnect(activeServer.id, true);
          }
        }).catch(function() {
          clearTimeout(timeout);
          console.log('[Netzwerk] Verbindung verloren – Neuverbindung wird versucht...');
          _nwConnect(activeServer.id, true);
        });
      }, _NW_RECONNECT_INTERVAL);
    }

    function _nwStopReconnect() {
      if (_nwReconnectTimer) {
        clearInterval(_nwReconnectTimer);
        _nwReconnectTimer = null;
      }
    }

    // ─── Team: COT-only Team Manager ────────────────────────────────
    var _TEAM_KEY = 'lpu5_team';

    function _teamGetData() {
      try { return JSON.parse(localStorage.getItem(_TEAM_KEY) || 'null'); } catch(e) { return null; }
    }
    function _teamSaveData(data) {
      if (data) localStorage.setItem(_TEAM_KEY, JSON.stringify(data));
      else localStorage.removeItem(_TEAM_KEY);
    }
    function _teamGenId() {
      return 'team-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);

    function _teamEsc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    var _TEAM_LOCAL_NAME_KEY     = 'lpu5_local_name';

    /**
     * Returns a usable callsign for the current user.
     * Priority: currentUserName > localStorage cached name > local callsign.
     */
    function _teamGetCallsign() {
      return currentUserName
        || localStorage.getItem('lpu5_username')
        || localStorage.getItem('lpu5_cached_user')
        || localStorage.getItem(_TEAM_LOCAL_CALLSIGN_KEY)
        || '';

      h += '<button id="team-cred-confirm-btn" class="menu-btn" style="background:rgba(46,204,113,0.2);border-color:#2ecc71;color:#2ecc71;font-weight:bold;justify-content:center;">';

        localStorage.setItem(_TEAM_LOCAL_CALLSIGN_KEY, csVal);
